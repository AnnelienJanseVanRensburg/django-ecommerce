{% extends 'base.html' %}

{% block title %}Edit Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="ec-card-flat">
            <h2 class="mb-4"><i class="bi bi-pencil me-2"></i>Edit {{ product.name }}</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{ product.description }}</textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Price (R)</label>
                        <input type="number" name="price" class="form-control" step="0.01" min="0" value="{{ product.price }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Stock Quantity</label>
                        <input type="number" name="stock" class="form-control" min="0" value="{{ product.stock }}" required>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-ec-primary">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                    <a href="{% url 'vendor_dashboard' %}" class="btn btn-ec-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
