{% extends 'base.html' %}

{% block title %}Edit Store{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="ec-card-flat">
            <h2 class="mb-4"><i class="bi bi-pencil me-2"></i>Edit Store</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Store Name</label>
                    <input type="text" name="name" class="form-control" value="{{ store.name }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4">{{ store.description }}</textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-ec-primary">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                    <a href="{% url 'vendor_dashboard' %}" class="btn btn-ec-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
