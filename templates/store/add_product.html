{% extends 'base.html' %}

{% block title %}Add Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="ec-card-flat">
            <h2 class="mb-1"><i class="bi bi-plus-circle me-2"></i>Add a Product</h2>
            <p class="text-muted mb-4">to <strong>{{ store.name }}</strong></p>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="name" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Price (R)</label>
                        <input type="number" name="price" class="form-control" step="0.01" min="0" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Stock Quantity</label>
                        <input type="number" name="stock" class="form-control" min="0" required>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-ec-primary">
                        <i class="bi bi-check-lg me-1"></i>Add Product
                    </button>
                    <a href="{% url 'vendor_dashboard' %}" class="btn btn-ec-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
