{% extends 'base.html' %}

{% block title %}Vendor Dashboard{% endblock %}

{% block content %}
<div class="ec-page-header d-flex justify-content-between align-items-center">
    <h2 class="mb-0"><i class="bi bi-grid me-2"></i>My Dashboard</h2>
    <a href="{% url 'create_store' %}" class="btn btn-ec-primary">
        <i class="bi bi-plus-lg me-1"></i>Create New Store
    </a>
</div>

<div class="row">
    {% for store in stores %}
        <div class="col-md-6 col-lg-4">
            <div class="ec-card">
                <h5 class="mb-2">
                    <a href="{% url 'vendor_store_detail' store.id %}" class="text-decoration-none" style="color: var(--ec-brown);">
                        <i class="bi bi-shop me-2"></i>{{ store.name }}
                    </a>
                </h5>
                <p class="text-muted small mb-3">{{ store.description }}</p>
                <a href="{% url 'vendor_store_detail' store.id %}" class="btn btn-ec-outline btn-sm">
                    Manage Store
                </a>
            </div>
        </div>
    {% empty %}
        <div class="col-12">
            <div class="ec-card-flat text-center py-5">
                <i class="bi bi-shop" style="font-size: 3rem; color: var(--ec-sandy);"></i>
                <p class="mt-3 mb-3" style="color: #888;">You have no stores yet</p>
                <a href="{% url 'create_store' %}" class="btn btn-ec-primary">
                    <i class="bi bi-plus-lg me-1"></i>Create Your First Store
                </a>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
