{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="ec-card-flat mt-4">
            <h2 class="mb-4"><i class="bi bi-person-plus me-2"></i>Create an Account</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="password" class="form-control pe-5" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="confirm_password" id="confirm_password" class="form-control pe-5" autocomplete="off" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="form-text" style="color: var(--ec-brown);">
                        <i class="bi bi-info-circle me-1"></i>Password must be at least 8 characters
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Account Type</label>
                    <select name="account_type" class="form-select">
                        <option value="buyer">Buyer — Browse and purchase products</option>
                        <option value="vendor">Vendor — Sell your products</option>
                    </select>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-ec-primary">Create Account</button>
                </div>
            </form>
            <hr class="my-3">
            <p class="text-center mb-0">
                Already have an account?
                <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: var(--ec-brown);">
                    Login here
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
