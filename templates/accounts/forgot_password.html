{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="ec-card-flat mt-4">
            <h2 class="mb-2"><i class="bi bi-key me-2"></i>Forgot Password</h2>
            <p class="mb-4" style="color: #666;">
                Enter your email address and we will send you a reset link.
            </p>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required autofocus>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-ec-primary">Send Reset Link</button>
                </div>
            </form>
            <hr class="my-3">
            <p class="text-center mb-0">
                Remember your password?
                <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: var(--ec-brown);">
                    Login here
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
