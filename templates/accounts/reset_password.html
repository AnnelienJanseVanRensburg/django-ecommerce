{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="ec-card-flat mt-4">
            <h2 class="mb-4"><i class="bi bi-lock me-2"></i>Reset Your Password</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="password" class="form-control pe-5" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="confirm_password" id="confirm_password" class="form-control pe-5" autocomplete="off" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="form-text" style="color: var(--ec-brown);">
                        <i class="bi bi-info-circle me-1"></i>Password must be at least 8 characters
                    </div>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-ec-primary">Reset Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
